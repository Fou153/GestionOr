workflows:
  android-workflow:
    name: Android Build

    environment:
      vars:
        PACKAGE_NAME: "com.fou.gestionor"

    scripts:
      - name: Installer les dépendances système (macOS)
        script: |
          brew update
          brew install autoconf libtool pkg-config
          
      - name: Installer Buildozer et Cython
        script: |
          pip3 install buildozer cython

      - name: Accepter automatiquement les licences Android SDK
        script: |
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"
          if command -v sdkmanager &> /dev/null; then
            yes | sdkmanager --licenses
          fi

      - name: Compiler l'application en APK (Debug)
        script: |
          # ÉTAPE CRUCIALE : On efface les variables de l'hôte qui perturbent Buildozer
          unset ANDROID_SDK_HOME
          unset ANDROID_NDK_HOME
          unset ANDROID_HOME
          
          # On lance la compilation en forçant la réponse automatique "yes"
          yes | buildozer android debug
          
    artifacts:
      - bin/*.apk
