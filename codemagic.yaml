workflows:
  android-workflow:
    name: Android Build

    environment:
      vars:
        PACKAGE_NAME: "com.fou.gestionor"

    scripts:
      - name: Installer les dépendances système requises par Kivy/Buildozer
        script: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev

      - name: Installer Buildozer et Cython
        script: |
          pip install buildozer cython

      - name: Accepter automatiquement les licences Android SDK
        script: |
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"
          # Cette ligne répond "oui" en boucle à toutes les licences de Google
          yes | buildozer android licenses

      - name: Compiler l'application en APK (Debug)
        script: |
          buildozer android debug

    artifacts:
      - bin/*.apk
