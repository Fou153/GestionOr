workflows:
  android-workflow:
    name: Android Build

    environment:
      vars:
        PACKAGE_NAME: "com.fou.gestionor"

    scripts:
      - name: Installer les dépendances système (macOS)
        script: |
          brew update
          brew install autoconf libtool pkg-config
          
      - name: Installer Buildozer et Cython
        script: |
          # Installation globale pour éviter les problèmes de PATH
          pip3 install buildozer cython

      - name: Accepter automatiquement les licences Android SDK
        script: |
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"
          # Validation automatique des licences Google
          yes | buildozer android licenses

      - name: Compiler l'application en APK (Debug)
        script: |
          buildozer android debug

    artifacts:
      - bin/*.apk
