workflows:
  android-workflow:
    name: Android Build

    environment:
      vars:
        PACKAGE_NAME: "com.fou.gestionor"

    scripts:
      - name: Installer les dépendances système (macOS)
        script: |
          # Sur macOS, on utilise brew à la place d'apt-get
          brew update
          brew install autoconf libtool pkg-config
          
      - name: Installer Buildozer et Cython
        script: |
          pip3 install --user buildozer cython
          # S'assurer que le chemin des scripts de pip est accessible
          echo 'export PATH="$HOME/Library/Python/3.9/bin:$PATH"' >> $RC_FILE

      - name: Accepter automatiquement les licences Android SDK
        script: |
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"
          # Accepter les licences Google à l'aide de l'outil de buildozer
          yes | buildozer android licenses

      - name: Compiler l'application en APK (Debug)
        script: |
          buildozer android debug

    artifacts:
      - bin/*.apk
